<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Action Item Extractor</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; margin: 2rem auto; max-width: 800px; padding: 0 1rem; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.25rem; margin-top: 1.5rem; }
      textarea { width: 100%; min-height: 160px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
      button { padding: 0.5rem 1rem; cursor: pointer; }
      button:hover { background-color: #e5e7eb; }
      .items { margin-top: 1rem; }
      .item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; }
      .muted { color: #6b7280; font-size: 0.875rem; }
      .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
      .notes-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
      .note-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.5rem; }
      .note-card .note-meta { font-size: 0.75rem; color: #6b7280; margin-bottom: 0.5rem; }
      .note-card .note-content { white-space: pre-wrap; font-size: 0.875rem; }
      .error { color: #dc2626; }
      .action-items-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
      .action-item-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.5rem; }
      .action-item-card .action-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
      .action-item-card .action-item-meta { font-size: 0.75rem; color: #6b7280; }
      .action-item-card .action-item-text { font-size: 0.875rem; }
      .action-item-card .action-item-status { font-size: 0.75rem; padding: 0.125rem 0.5rem; border-radius: 0.25rem; }
      .action-item-card .action-item-status.done { background: #d1fae5; color: #065f46; }
      .action-item-card .action-item-status.pending { background: #fef3c7; color: #92400e; }
    </style>
  </head>
  <body>
    <h1>Action Item Extractor</h1>
    <p class="muted">Paste notes and extract actionable items. Minimal raw HTML frontend.</p>

    <label for="text">Notes</label>
    <textarea id="text" placeholder="Paste notes here...&#10;e.g.&#10;- [ ] Set up database&#10;- Implement extract endpoint"></textarea>
    <div class="row">
      <label class="row"><input id="save_note" type="checkbox" checked /> Save as note</label>
      <button id="extract">Extract</button>
      <button id="extract-llm">Extract LLM</button>
    </div>

    <div class="items" id="items"></div>

    <div class="action-items-section">
      <div class="row">
        <h2>All Action Items</h2>
        <button id="list-action-items">List ActionItems</button>
      </div>
      <div id="action-items-list"></div>
    </div>

    <div class="notes-section">
      <div class="row">
        <h2>Saved Notes</h2>
        <button id="list-notes">List Notes</button>
      </div>
      <div id="notes-list"></div>
    </div>

    <script>
      const $ = (sel) => document.querySelector(sel);
      const itemsEl = $('#items');
      const notesListEl = $('#notes-list');
      const actionItemsListEl = $('#action-items-list');

      // Helper function to extract action items (used by both buttons)
      async function extractItems(endpoint) {
        const text = $('#text').value;
        const save = $('#save_note').checked;
        itemsEl.textContent = 'Extracting...';
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, save_note: save }),
          });
          if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            throw new Error(errorData.detail || 'Request failed');
          }
          const data = await res.json();
          if (!data.items || data.items.length === 0) {
            itemsEl.innerHTML = '<p class="muted">No action items found.</p>';
            return;
          }
          itemsEl.innerHTML = data.items.map(it => (
            `<div class="item"><input type="checkbox" data-id="${it.id}" /> <span>${it.text}</span></div>`
          )).join('');
          itemsEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', async (e) => {
              const id = e.target.getAttribute('data-id');
              await fetch(`/action-items/${id}/done`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ done: e.target.checked }),
              });
            });
          });
        } catch (err) {
          console.error(err);
          itemsEl.innerHTML = `<p class="error">Error: ${err.message}</p>`;
        }
      }

      // Standard extraction (with heuristic fallback)
      $('#extract').addEventListener('click', () => extractItems('/action-items/extract'));

      // LLM-only extraction (no fallback)
      $('#extract-llm').addEventListener('click', () => extractItems('/action-items/extract/llm'));

      // List all action items
      $('#list-action-items').addEventListener('click', async () => {
        actionItemsListEl.textContent = 'Loading action items...';
        try {
          const res = await fetch('/action-items', {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
          });
          if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            throw new Error(errorData.detail || 'Request failed');
          }
          const data = await res.json();
          if (!data || data.length === 0) {
            actionItemsListEl.innerHTML = '<p class="muted">No action items found.</p>';
            return;
          }
          actionItemsListEl.innerHTML = data.map(item => (
            `<div class="action-item-card">
              <div class="action-item-header">
                <span class="action-item-meta">ID: ${item.id} · Note ID: ${item.note_id ?? 'N/A'} · ${item.created_at || 'Unknown date'}</span>
                <span class="action-item-status ${item.done ? 'done' : 'pending'}">${item.done ? 'Done' : 'Pending'}</span>
              </div>
              <div class="action-item-text">${escapeHtml(item.text)}</div>
            </div>`
          )).join('');
        } catch (err) {
          console.error(err);
          actionItemsListEl.innerHTML = `<p class="error">Error: ${err.message}</p>`;
        }
      });

      // List all notes
      $('#list-notes').addEventListener('click', async () => {
        notesListEl.textContent = 'Loading notes...';
        try {
          const res = await fetch('/notes', {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
          });
          if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            throw new Error(errorData.detail || 'Request failed');
          }
          const data = await res.json();
          if (!data.notes || data.notes.length === 0) {
            notesListEl.innerHTML = '<p class="muted">No notes found.</p>';
            return;
          }
          notesListEl.innerHTML = data.notes.map(note => (
            `<div class="note-card">
              <div class="note-meta">Note #${note.id} · ${note.created_at || 'Unknown date'}</div>
              <div class="note-content">${escapeHtml(note.content)}</div>
            </div>`
          )).join('');
        } catch (err) {
          console.error(err);
          notesListEl.innerHTML = `<p class="error">Error: ${err.message}</p>`;
        }
      });

      // Helper to escape HTML to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
